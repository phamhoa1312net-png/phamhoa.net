index.html<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phạm Hoà</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Cài đặt chung */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19; /* Màu nền xanh đen tối */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Tạo một hình nền mô phỏng lưới không gian tạm thời */
            background-image: radial-gradient(circle at center, #1a233a 0%, #0b0f19 70%);
        }

        /* Phần Header (Logo) */
        .header {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.3);
        }

        .logo-text {
            color: #ff3333;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7); /* Hiệu ứng phát sáng đỏ */
        }

        .subtitle {
            color: #888;
            font-size: 10px;
            letter-spacing: 1px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Phần Nội dung chính */
        .main-content {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            margin-top: 50px;
            position: relative;
            z-index: 10;
        }

        .main-title {
            font-size: 42px;
            font-style: italic;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .description {
            font-size: 16px;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 40px;
        }

        /* Các nút bấm (Buttons) */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Nút màu Gradient */
        .btn-primary {
            background: linear-gradient(135deg, #a14fff, #4a7dff);
            border: none;
        }

        /* Nút viền (Outline) */
        .btn-outline {
            background: transparent;
            border: 1px solid #ffffff;
        }

        /* Nút nổi ở góc phải dưới (Floating Action Buttons) */
        .floating-buttons {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .fab-chat {
            background: linear-gradient(135deg, #5b86e5, #36d1dc);
        }

        .fab-telegram {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }
        
        /* Mũi tên trỏ xuống */
        .scroll-down {
            position: absolute;
            bottom: 20px;
            color: white;
            font-size: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">PHẠM HOÀ</div>
        <div class="subtitle">DIGITAL & SOCIAL MEDIA SOLUTIONS</div>
    </div>

    <div class="main-content">
        <h1 class="main-title">Phạm Hoà</h1>
        <p class="description">
            Cung cấp phần mềm hỗ trợ game chất lượng – Dịch vụ Marketing & quảng cáo chiến lược phủ sóng toàn cầu – Thu mua, mua bán acc Free Fire uy tín, nhanh gọn, giá tốt.
        </p>
        
        <div class="button-group">
            <a href="#" class="btn btn-primary">Đánh giá</a>
            <a href="#" class="btn btn-outline">Hỗ trợ</a>
        </div>
    </div>

    <div class="floating-buttons">
        <a href="#" class="fab fab-chat"><i class="fa-regular fa-comment"></i></a>
        <a href="#" class="fab fab-telegram"><i class="fa-regular fa-paper-plane"></i></a>
    </div>

    <div class="scroll-down">
        <i class="fa-solid fa-chevron-down"></i>
    </div>

</body>
</html>
